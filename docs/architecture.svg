<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 360" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="860" height="360" fill="#0d1117"/>
  <text x="430" y="40" fill="#e6edf3" font-size="22" font-weight="700" text-anchor="middle">CAPProbe — 3-hop A2A conformance probe</text>
  <text x="430" y="64" fill="#8b949e" font-size="13" text-anchor="middle">one purchase → two on-chain USDC settlements on Base</text>

  <!-- Customer -->
  <rect x="40" y="120" width="200" height="110" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="140" y="158" fill="#e6edf3" font-size="16" font-weight="700" text-anchor="middle">Customer</text>
  <text x="140" y="182" fill="#8b949e" font-size="12" text-anchor="middle">requester agent</text>
  <text x="140" y="204" fill="#58a6ff" font-size="11" text-anchor="middle">requester-demo.js</text>

  <!-- CAPProbe -->
  <rect x="330" y="120" width="200" height="110" rx="12" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <text x="430" y="158" fill="#e6edf3" font-size="16" font-weight="700" text-anchor="middle">CAPProbe</text>
  <text x="430" y="182" fill="#8b949e" font-size="12" text-anchor="middle">provider + requester</text>
  <text x="430" y="204" fill="#58a6ff" font-size="11" text-anchor="middle">provider.js</text>

  <!-- Target -->
  <rect x="620" y="120" width="200" height="110" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="720" y="158" fill="#e6edf3" font-size="16" font-weight="700" text-anchor="middle">Target agent</text>
  <text x="720" y="182" fill="#8b949e" font-size="12" text-anchor="middle">any CAP agent</text>
  <text x="720" y="204" fill="#58a6ff" font-size="11" text-anchor="middle">under test</text>

  <!-- arrows: forward -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3fb950"/>
    </marker>
    <marker id="arrowback" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8b949e"/>
    </marker>
  </defs>

  <line x1="240" y1="160" x2="328" y2="160" stroke="#3fb950" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="284" y="150" fill="#3fb950" font-size="11" text-anchor="middle">negotiate</text>
  <text x="284" y="178" fill="#8b949e" font-size="10" text-anchor="middle">pay $ USDC</text>

  <line x1="530" y1="160" x2="618" y2="160" stroke="#3fb950" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="574" y="150" fill="#3fb950" font-size="11" text-anchor="middle">negotiate</text>
  <text x="574" y="178" fill="#8b949e" font-size="10" text-anchor="middle">pay $ USDC</text>

  <!-- arrows: report back -->
  <path d="M716,250 C540,300 320,300 144,250" fill="none" stroke="#8b949e" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrowback)"/>
  <text x="430" y="300" fill="#8b949e" font-size="12" text-anchor="middle">scored conformance report (JSON) flows back: 100/A … 15/F + fixes</text>

  <!-- footer -->
  <text x="430" y="338" fill="#6e7681" font-size="11" text-anchor="middle">negotiate → pay → deliver lifecycle exercised from both requester and provider sides · @croo-network/sdk</text>
</svg>

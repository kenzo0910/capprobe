name: "CAPProbe Conformance Gate"
description: "Run a CAP conformance probe against a CROO agent and fail the build if it scores below a threshold."
author: "CAPProbe contributors"
branding:
  icon: "check-circle"
  color: "blue"

inputs:
  service-id:
    description: "Target CAP serviceId to probe"
    required: true
  api-key:
    description: "CROO SDK-Key (croo_sk_...). Pass via a GitHub secret."
    required: true
  min-score:
    description: "Minimum passing score (0-100). Build fails below this."
    required: false
    default: "60"
  api-url:
    description: "CROO API base URL"
    required: false
    default: "https://api.croo.network"
  ws-url:
    description: "CROO WebSocket URL"
    required: false
    default: "wss://api.croo.network/ws"

runs:
  using: "composite"
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: "20"
    - name: Install CAPProbe deps
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm install --no-audit --no-fund
    - name: Run conformance probe
      shell: bash
      working-directory: ${{ github.action_path }}
      # All inputs flow through env (no shell interpolation of user values, so a
      # malicious service-id cannot inject a subshell). probe.js reads TARGET_SERVICE_ID.
      env:
        CROO_MODE: live
        CROO_API_KEY: ${{ inputs.api-key }}
        CROO_API_URL: ${{ inputs.api-url }}
        CROO_WS_URL: ${{ inputs.ws-url }}
        MIN_SCORE: ${{ inputs.min-score }}
        TARGET_SERVICE_ID: ${{ inputs.service-id }}
      run: node scripts/probe.js
